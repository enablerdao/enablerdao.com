<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — EnablerDAO</title>
<meta name="description" content="EnablerDAO テクノロジーブログ。AI、OSS、Rustの最新動向をAIが自動生成。">
<link rel="icon" href="/favicon.ico">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #ccc;
    font-family: 'SF Mono','Fira Code','Cascadia Code','Consolas',monospace;
    font-size: 14px;
    line-height: 1.8;
    min-height: 100vh;
  }

  /* header */
  .blog-header {
    border-bottom: 1px solid #1a1a1a;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .blog-logo {
    color: #00ff00;
    font-size: 18px;
    font-weight: 700;
    text-decoration: none;
    text-shadow: 0 0 8px rgba(0,255,0,0.4);
  }
  .blog-nav a {
    color: #555;
    text-decoration: none;
    margin-left: 24px;
    font-size: 13px;
    transition: color 0.2s;
  }
  .blog-nav a:hover,
  .blog-nav a.active { color: #00ffff; }

  /* main */
  .blog-wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px;
  }
  .blog-title {
    color: #00ffff;
    font-size: 13px;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  .blog-subtitle {
    color: #555;
    font-size: 12px;
    margin-bottom: 40px;
  }

  /* cards */
  .blog-container {}
  .blog-post-card {
    border-left: 2px solid rgba(0,255,0,0.3);
    padding: 16px 20px;
    margin-bottom: 24px;
    background: #0f0f0f;
    transition: border-color 0.2s, background 0.2s;
  }
  .blog-post-card:hover {
    border-color: #00ff00;
    background: #111;
  }
  .blog-post-meta {
    color: #555;
    font-size: 11px;
    margin-bottom: 6px;
  }
  .blog-post-title {
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    text-decoration: none;
    display: block;
    margin-bottom: 8px;
  }
  .blog-post-title:hover { color: #00ffff; }
  .blog-post-excerpt {
    color: #888;
    font-size: 13px;
    margin-bottom: 10px;
  }
  .read-more {
    color: #00ff00;
    font-size: 12px;
    text-decoration: none;
  }
  .read-more:hover { text-decoration: underline; }

  /* empty state */
  .blog-empty {
    color: #444;
    text-align: center;
    padding: 60px 0;
  }
  .blog-empty code {
    color: #00ff00;
    display: block;
    margin-top: 12px;
  }

  /* footer */
  .blog-footer {
    border-top: 1px solid #1a1a1a;
    text-align: center;
    padding: 20px;
    color: #333;
    font-size: 11px;
    margin-top: 40px;
  }
  .blog-footer a { color: #555; text-decoration: none; }
  .blog-footer a:hover { color: #00ffff; }
</style>
</head>
<body>

<header class="blog-header">
  <a href="/" class="blog-logo">$ enablerdao</a>
  <nav class="blog-nav">
    <a href="/">Home</a>
    <a href="/blog/" class="active">Blog</a>
  </nav>
</header>

<div class="blog-wrap">
  <div class="blog-title">// BLOG</div>
  <div class="blog-subtitle">Auto-generated tech digest — powered by nanobot AI</div>

  <div class="blog-container">
    <div class="blog-empty">
      <p>// no posts yet</p>
      <code>$ ANTHROPIC_API_KEY=sk-... ./scripts/generate-blog-post.sh</code>
    </div>
  </div>
</div>

<footer class="blog-footer">
  <a href="https://enablerdao.com">enablerdao.com</a> — generated by AI, reviewed by humans
</footer>

</body>
</html>
