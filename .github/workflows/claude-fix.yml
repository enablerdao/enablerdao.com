name: Claude Code Auto-Fix

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to fix'
        required: true
        default: '1'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude-fix:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.issue.labels.*.name, 'fix-request')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE_NUM="${{ github.event.inputs.issue_number }}"
          else
            ISSUE_NUM="${{ github.event.issue.number }}"
          fi

          ISSUE_BODY=$(gh issue view "$ISSUE_NUM" --json body -q .body)

          printf '%s\n' \
            "You are the website maintenance agent for enablerdao.com, the corporate site of Enabler DAO." \
            "Implement the fix request below." \
            "" \
            "Rules:" \
            "- Only modify files in the static/ folder (HTML, CSS, JS files)" \
            "- Never modify or output .env files, secret keys, or API keys" \
            "- Follow the existing design and style" \
            "- After making changes, output a list of changed files and a summary" \
            "" \
            "Fix request (GitHub Issue #${ISSUE_NUM}):" \
            "${ISSUE_BODY}" \
            > /tmp/prompt.txt

          claude --print \
            --dangerously-skip-permissions \
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash" \
            --max-turns 20 \
            "$(cat /tmp/prompt.txt)"

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE_NUM="${{ github.event.inputs.issue_number }}"
          else
            ISSUE_NUM="${{ github.event.issue.number }}"
          fi
          BRANCH="fix/issue-${ISSUE_NUM}"

          git config user.name "Claude Code"
          git config user.email "noreply@anthropic.com"
          git checkout -b "$BRANCH"
          git add static/

          if git diff --cached --quiet; then
            echo "No changes made"
            gh issue comment "$ISSUE_NUM" --body "No changes needed."
            exit 0
          fi

          ISSUE_TITLE=$(gh issue view "$ISSUE_NUM" --json title -q .title)
          git commit -m "fix: #${ISSUE_NUM} ${ISSUE_TITLE}"
          git push origin "$BRANCH"

          gh pr create \
            --title "fix: #${ISSUE_NUM} ${ISSUE_TITLE}" \
            --body "Fix Request #${ISSUE_NUM} - Generated by Claude Code Auto-Fix" \
            --base main \
            --head "$BRANCH"

          PR_URL=$(gh pr view "$BRANCH" --json url -q .url 2>/dev/null || echo "")
          echo "PR created: $PR_URL"
          if [ -n "$PR_URL" ]; then
            gh issue comment "$ISSUE_NUM" --body "PR created: $PR_URL"
          fi
