name: Deploy enablerdao.com to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency: deploy-enablerdao
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --config fly-spin.toml --remote-only --app enablerdao --wait-timeout=600
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
